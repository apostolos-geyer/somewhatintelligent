# Captain test suites — one per test-bearing package. The RWX gate (.rwx/ci.yml)
# runs `captain run si-<pkg>` per package; Captain runs the command, parses
# vitest's JSON, emits rwx-v1-json (surfaced inline in the RWX UI via the task's
# `outputs.test-results`), and retries only failed tests.
#
# `bunx vp` is the resolver-prefixed form (the doc's `npx vitest` equivalent) —
# Captain execs the command directly, so a bare `vp` isn't on PATH. `--root <dir>`
# scopes the run to one package from the repo root.
test-suites:
  si-bouncer:
    command: npx vp test run --root workers/bouncer --reporter=default --reporter=json --outputFile=../../.captain-out/bouncer.vitest.json
    results:
      language: JavaScript
      framework: Vitest
      path: .captain-out/bouncer.vitest.json
    output:
      reporters:
        rwx-v1-json: .captain-out/bouncer.rwx.json
    retries:
      attempts: 2
      command: npx vp test run --root workers/bouncer '{{ file }}' -t '{{ testNamePattern }}' --reporter=default --reporter=json --outputFile=../../.captain-out/bouncer.vitest.json

  si-guestlist:
