# somewhatintelligent — staging deploy lane: changed-subset, promote-over-rebuild
# (docs/ops/04 §5). Called as an embedded run from .rwx/ci.yml after the gate
# (replaces the old full-fleet .rwx/deploy.yml call for STAGING; deploy.yml
# remains the env-parameterized full-fleet reference used by force-full
# recovery guidance and manual runs).
#
# Per push to main: affected workers only (scripts/changed-workers.sh — a
# packages/* or rpc-worker change still fans out to the whole platform fleet;
# inbox/** triggers nothing: the vendored inbox app deploys manually, outside
# RWX), each promoted from
# its PR-uploaded version when eligible, full-built otherwise
# (scripts/promote-staging.sh owns the decision; wrangler.jsonc changes and
# missing versions always fall back). Until .rwx/preview.yml's PR trigger is
# enabled (owner action — si_preview vault), every affected worker
# simply falls back to full deploy: this lane is safe to run WITHOUT previews
# and the win is subset deploys; promotion activates by itself once versions
# exist.
#
# Disaster lever: rwx run .rwx/promote-staging.yml --init deploy=true \
#   --init force-full=true --init commit-sha=<sha>   (ships EVERYTHING, no promotion)

on:
  cli:
    init:
      commit-sha: ${{ event.git.sha }}
      base-sha: ""
      deploy: false
      force-full: false
      gh-deployment-env: staging
      gh-deployment-url: https://staging.somewhatintelligent.ca

# Same pool as the old staging lane: deploys to staging never race.
concurrency-pools:
  - id: somewhatintelligent/somewhatintelligent:deploy-staging
    capacity: 1
    on-overflow: cancel-waiting

base:
  image: ubuntu:24.04
  config: rwx/base 1.1.1

aliases:
  deploy-env: &deploy-env
    CLOUDFLARE_API_TOKEN: ${{ vaults.si_deploy.secrets.CLOUDFLARE_API_TOKEN }}
    CLOUDFLARE_ACCOUNT_ID: ${{ vaults.si_deploy.secrets.CLOUDFLARE_ACCOUNT_ID }}
    GH_TOKEN: ${{ vaults.si_deploy.github-apps.rwx-automation-somewhatintelligent.token }}
    GH_DEPLOYMENT_ENV: ${{ init.gh-deployment-env }}
    GH_DEPLOYMENT_URL: ${{ init.gh-deployment-url }}

tasks:
  - key: code
    call: git/clone 2.0.8
    with:
      repository: https://github.com/apostolos-geyer/somewhatintelligent.git
      ref: ${{ init.commit-sha }}
      github-token: ${{ github.token }}

  - key: system-packages
    run: |
      sudo apt-get update
      sudo apt-get install -y jq unzip gh
      sudo apt-get clean

  - key: bun
    use: system-packages
    run: |
      curl -fsSL https://bun.sh/install | bash -s "bun-v1.3.11"
      echo "$HOME/.bun/bin" > "$RWX_ENV/PATH"
      "$HOME/.bun/bin/bun" --version

  - key: node
    call: nodejs/install 1.1.14
    with:
      node-version: 24.16.0

  # UNFILTERED install, same shape as deploy.yml's — deploy/preview lanes
  # BUILD the workers, and the ci.yml-style outputs filter (node_modules/**
  # only) drops workspace bin links builds need (first live run: identity's
  # `platform-og` bin from packages/og was missing → "cannot find binary
  # path"). The gate never builds, so its filtered install stays as-is;
  # here correctness beats sharing cache entries with it.
  - key: install
    use: [code, bun]
    run: bun install --frozen-lockfile --ignore-scripts
    timeout: 8m

  # Changed files for THIS push: base-sha (event.github.push.before via ci.yml)
  # … commit-sha. Force-full, a missing base (bare CLI run), or the all-zeros
  # sha of a force-push all degrade to "all workers".
  - key: detect
    use: [code, system-packages]
    if: ${{ init.deploy }}
    cache: false
    env:
      GH_TOKEN:
        value: ${{ github.token }}
        cache-key: excluded
    run: |
      set -euo pipefail
      BASE="${{ init.base-sha }}"
      : > /tmp/changed-files
      if [ "${{ init.force-full }}" = "true" ] || [ -z "${BASE}" ] || [ "${BASE}" = "0000000000000000000000000000000000000000" ]; then
        echo "force-full / no usable base — treating ALL workers as affected"
        printf 'promoter roadie guestlist identity store bouncer' > "$RWX_VALUES/changed"
        exit 0
      fi
      gh api "repos/apostolos-geyer/somewhatintelligent/compare/${BASE}...${{ init.commit-sha }}" \
        --paginate --jq '.files[].filename' > /tmp/changed-files
      echo "-- changed files --"; cat /tmp/changed-files
      bash scripts/changed-workers.sh < /tmp/changed-files | tr '\n' ' ' | sed 's/ $//' > "$RWX_VALUES/changed"
      echo "affected workers: [$(cat "$RWX_VALUES/changed")]"

  # cache: false — a deploy must always execute (same rule as deploy.yml).
  - key: deploy
    use: [detect, install, node]
    if: ${{ init.deploy }}
    cache: false
    timeout: 30m
    env:
      <<: *deploy-env
      CHANGED: ${{ tasks.detect.values.changed }}
      SHA: ${{ init.commit-sha }}
      FORCE_FULL: ${{ init.force-full }}
    run: |
      set -euo pipefail
      source scripts/rwx-github-deployment.sh
      gh_deployment_create "${{ init.commit-sha }}"
      trap 'rc=$?; if [ "$rc" -eq 0 ]; then gh_deployment_status success "staging: ${CHANGED:-nothing} shipped"; else gh_deployment_status failure "staging deploy failed"; fi; exit $rc' EXIT
      gh_deployment_status in_progress "deploying changed workers (staging)"
      # Recompute the changed-file list here (same inputs) — file passing via
      # values is line-limited; the list can be long.
      BASE="${{ init.base-sha }}"
      if [ "${FORCE_FULL}" = "true" ] || [ -z "${BASE}" ] || [ "${BASE}" = "0000000000000000000000000000000000000000" ]; then
        : > /tmp/changed-files
      else
        gh api "repos/apostolos-geyer/somewhatintelligent/compare/${BASE}...${{ init.commit-sha }}" \
          --paginate --jq '.files[].filename' > /tmp/changed-files
      fi
      FILES=/tmp/changed-files bash scripts/promote-staging.sh
      # promote-staging.sh recorded a per-worker GitHub Deployment (with CF
      # dashboard + live-URL links) for each worker it shipped; upsert the
      # compact summary comment before the smoke test (the ships above are
      # real regardless of the smoke outcome).
      gh_deploy_summary_comment "${SHA}"
      bash scripts/smoke-test.sh "${{ init.gh-deployment-url }}"
