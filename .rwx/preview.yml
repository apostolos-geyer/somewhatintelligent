# somewhatintelligent — per-PR worker previews via `wrangler versions upload` (docs/ops/04 §4).
#
# For each worker the PR actually changes (scripts/changed-workers.sh ownership
# rules), upload a VERSION of the staging worker (0% traffic) and surface its
# preview URL: `pr-<n>-<worker>.<account-subdomain>.workers.dev` (stable per-PR
# alias) on the PR as a sticky comment + in this run's links panel. Bindings ride
# the version, so previews hit STAGING D1/R2/queues automatically. What previews
# are NOT (footer of the PR comment says so too): bouncer-fronted, cross-
# subdomain-auth'd, or composed with sibling PR versions — units, not journeys.
# (inbox/ is standalone and deploys manually outside RWX — it gets no preview
# versions and no lane at all.)
#
# The uploaded versions double as the promote-on-merge artifacts:
# .rwx/promote-staging.yml resolves them by tag `pr-<n>-<head-sha>` and
# promotes instead of rebuilding.
#
# ── THE PREVIEW VAULT ────────────────────────────────────────────────────────
# This file references the UNLOCKED vault `si_preview`, which holds:
#   CLOUDFLARE_API_TOKEN_PREVIEW — the minted `si-preview` token from
#     scripts/provision/tokens.ts (MUST be minted FROM this fork's CF account —
#     a foreign-account token throws D1 7403-class errors), scoped to Workers
#     Scripts:Write + Account Settings:Read ONLY (no D1/R2/routes: a leaked
#     preview token can upload 0%-traffic versions, nothing else). Unlocked
#     vault = any branch can upload versions; acceptable for this
#     single-maintainer private repo.
# Optionally grant the rwx-automation-si GitHub App
# issues:write and add it to the vault for PR comments
# (scripts/pr-preview-comment.sh degrades to run-links-only without it).
# Vault does NOT exist yet on this fork — until `rwx vaults create --name
# si_preview --unlocked` is run and the token set, this lane is
# scaffolding-only (docs/ops/rwx-setup.md is the activation runbook).
# Ad-hoc rerun for any open PR: rwx run .rwx/preview.yml --init pr-number=<N>
# ─────────────────────────────────────────────────────────────────────────────

on:
  github:
    pull_request:
      title: "Previews for PR #${{ event.github.pull_request.number }}"
      init:
        commit-sha: ${{ event.git.sha }}
        branch: ${{ event.git.branch }}
        pr-number: ${{ event.github.pull_request.number }}
        # The event context is the RAW webhook payload: the PR object lives at
        # payload.pull_request, so the base sha path doubles the segment
        # (first live PR trigger failed on the un-doubled path).
        base-sha: ${{ event.github.pull_request.pull_request.base.sha }}
  cli:
    init:
      commit-sha: ${{ event.git.sha }}
      branch: ${{ event.git.branch }}
      # For CLI testing pass an OPEN PR's number: --init pr-number=44
      pr-number: ""
      base-sha: ""

concurrency-pools:
  # Previews only — never shares the deploy/production pools. cancel-running:
  # a newer push supersedes in-flight preview uploads.
  - id: somewhatintelligent/somewhatintelligent:preview-${{ init.branch }}
    capacity: 1
    on-overflow: cancel-running

base:
  image: ubuntu:24.04
  config: rwx/base 1.1.1

tasks:
  - key: code
    call: git/clone 2.0.8
    with:
      repository: https://github.com/apostolos-geyer/somewhatintelligent.git
      ref: ${{ init.commit-sha }}
      # public repo: anonymous clone, no github-token (avoids any dependency on the GitHub App installation)

  - key: system-packages
    run: |
      sudo apt-get update
      sudo apt-get install -y jq unzip gh
      sudo apt-get clean

  - key: bun
    use: system-packages
    run: |
      curl -fsSL https://bun.sh/install | bash -s "bun-v1.3.11"
      echo "$HOME/.bun/bin" > "$RWX_ENV/PATH"
      "$HOME/.bun/bin/bun" --version

  - key: node
    call: nodejs/install 1.1.14
    with:
      node-version: 24.16.0

  # UNFILTERED install, same shape as deploy.yml's — deploy/preview lanes
  # BUILD the workers, and the ci.yml-style outputs filter (node_modules/**
  # only) drops workspace bin links builds need (first live run: identity's
  # `platform-og` bin from packages/og was missing → "cannot find binary
  # path"). The gate never builds, so its filtered install stays as-is;
  # here correctness beats sharing cache entries with it.
  - key: install
    use: [code, bun]
    run: bun install --frozen-lockfile --ignore-scripts
    timeout: 8m

  # PR-changed files -> affected workers (scripts/changed-workers.sh rules).
  # cache: false — the gh compare read must reflect THIS push, never a replay.
  - key: detect
    use: [code, system-packages]
    cache: false
    env:
      GH_TOKEN:
        value: ${{ github.token }}
        cache-key: excluded
    run: |
      set -euo pipefail
      PR="${{ init.pr-number }}"
      if [ -z "${PR}" ]; then
        echo "no pr-number — nothing to preview (CLI run without --init pr-number=N)"
        printf '' > "$RWX_VALUES/changed"
        exit 0
      fi
      BASE="${{ init.base-sha }}"
      if [ -z "${BASE}" ]; then
        BASE="$(gh api "repos/apostolos-geyer/somewhatintelligent/pulls/${PR}" --jq '.base.sha')"
      fi
      gh api "repos/apostolos-geyer/somewhatintelligent/compare/${BASE}...${{ init.commit-sha }}" \
        --paginate --jq '.files[].filename' > /tmp/changed-files
      echo "-- changed files --"; cat /tmp/changed-files
      bash scripts/changed-workers.sh < /tmp/changed-files | tr '\n' ' ' | sed 's/ $//' > "$RWX_VALUES/changed"
      echo "affected workers: [$(cat "$RWX_VALUES/changed")]"

  # One upload task per affected worker, generated at runtime (parallel builds),
  # plus the sticky-comment task wired `after` all of them. The YAML emission
  # lives in scripts/generate-preview-tasks.sh (checked in + locally testable —
  # inlining YAML-emitting heredocs inside a YAML block scalar is unmaintainable).
  - key: generate-uploads
    use: [code, system-packages]
    cache: false
    env:
      CHANGED: ${{ tasks.detect.values.changed }}
      PR: ${{ init.pr-number }}
      SHA: ${{ init.commit-sha }}
    run: |
      set -euo pipefail
      OUT="$RWX_DYNAMIC_TASKS" bash scripts/generate-preview-tasks.sh
